{% extends "base.html" %}

{% block title %}Agent Interaction - Home{% endblock %}

{% block content %}
    <div class="header">
        <h1>📊 Your Data Insight Agent</h1>
    </div>

    <div class="page-section" id="top-page">
        <div class="column" id="data-upload-section">
            <h2>Data Upload</h2>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="file" id="fileUpload" name="file">
                <button type="button" id="uploadData">Upload File</button>
            </form>
            <div id="uploadMessages">
                <!-- Upload status and metadata will be displayed here -->
            </div>
        </div>
        <div class="column" id="metadata-section">
            <h2>Metadata</h2>
            <textarea id="metadataDisplay" placeholder="Editable metadata will appear here..."></textarea> {# readonly attribute removed #}
            <button id="approveMetadata">Approve Metadata</button>
        </div>
    </div>

    <div class="page-section" id="middle-page">
        <div class="column" id="agent-selection-section">
            <h2>Select Agent</h2>
            <div class="radio-group">
                <input type="radio" id="sqlAgent" name="agentType" value="sql" checked>
                <label for="sqlAgent">SQL (DuckDB)</label><br>
                <input type="radio" id="rAgent" name="agentType" value="r_datatable">
                <label for="rAgent">R (data.table)</label><br>
                <input type="radio" id="pythonAgent" name="agentType" value="python_pandas">
                <label for="pythonAgent">Python (Pandas)</label><br>
            </div>
        </div>
        <div class="column" id="query-submission-section">
            <h2>Enter Query</h2>
            <textarea id="naturalLanguageQuery" placeholder="Enter your query here..."></textarea>
            <button id="submitQuery">Submit Query</button>
        </div>
    </div>

    <div class="page-section" id="bottom-page">
        <div class="column" id="visualization-section">
            <h2>Plot Display</h2>
            <div id="plotDisplay">
                <!-- Plots will be rendered here -->
            </div>
            <button id="requestPlot">Generate Plot</button>
        </div>
        <div class="column" id="response-section">
            <h2>Response</h2>
            <div class="chat-history" id="chatHistory">
                <!-- Agent responses (SQL query) will be displayed here -->
            </div>
        </div>
    </div>

<script>
let currentMetadataForQuery = null; // To store metadata from upload

document.getElementById('uploadData').addEventListener('click', async () => {
    const fileInput = document.getElementById('fileUpload');
    const uploadMessages = document.getElementById('uploadMessages');
    const metadataDisplay = document.getElementById('metadataDisplay');
    const chatHistory = document.getElementById('chatHistory');

    uploadMessages.innerHTML = ''; // Clear previous messages
    metadataDisplay.value = ''; // Clear previous metadata
    chatHistory.innerHTML = ''; // Clear previous SQL query
    currentMetadataForQuery = null; // Reset metadata

    if (fileInput.files.length === 0) {
        uploadMessages.innerHTML = '<p style="color: red;">Please select a file to upload.</p>';
        return;
    }

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    try {
        uploadMessages.innerHTML = '<p>Uploading and processing...</p>';
        const response = await fetch('/upload', {
            method: 'POST',
            body: formData
        });

        const result = await response.json();

        if (response.ok) {
            uploadMessages.innerHTML = `<p style="color: green;">${result.message}</p>`;
            if (result.metadata) {
                currentMetadataForQuery = result.metadata; // Store for /query
                let metadataString = `Table Name: ${result.metadata.table_name}\n`;
                if (result.metadata.message) { // Display additional messages like "manual input needed"
                    metadataString += `Info: ${result.metadata.message}\n`;
                }
                metadataString += "\nColumns:\n";
                if (result.metadata.columns && result.metadata.columns.length > 0) {
                    result.metadata.columns.forEach(col => {
                        metadataString += `- ${col.name} (${col.type})\n`;
                    });
                } else {
                    metadataString += "- (No columns inferred or defined)\n";
                }
                metadataDisplay.value = metadataString;
            }
        } else {
            uploadMessages.innerHTML = `<p style="color: red;">Error: ${result.error}</p>`;
        }
    } catch (error) {
        uploadMessages.innerHTML = `<p style="color: red;">An unexpected error occurred: ${error.toString()}</p>`;
    }
});

document.getElementById('submitQuery').addEventListener('click', async () => {
    const naturalLanguageQuery = document.getElementById('naturalLanguageQuery').value;
    const chatHistory = document.getElementById('chatHistory');
    // Updated to use radio buttons for agent selection
    const selectedAgentType = document.querySelector('input[name="agentType"]:checked').value;

    chatHistory.innerHTML = ''; // Clear previous query/error

    if (!naturalLanguageQuery.trim()) {
        chatHistory.innerHTML = '<p style="color: orange;">Please enter a natural language query.</p>';
        return;
    }

    if (!currentMetadataForQuery) {
        chatHistory.innerHTML = '<p style="color: orange;">Please upload a file and process its metadata first.</p>';
        return;
    }
    
    if (!currentMetadataForQuery.table_name) {
        chatHistory.innerHTML = '<p style="color: orange;">Table name is missing in metadata. Cannot generate query.</p>';
        return;
    }
     // For R agent and Python Pandas agent, columns are essential for the prompt
    if ((selectedAgentType === 'r_datatable' || selectedAgentType === 'python_pandas') &&
        (!currentMetadataForQuery.columns || currentMetadataForQuery.columns.length === 0)) {
        chatHistory.innerHTML = '<p style="color: orange;">Column metadata is missing. ' + selectedAgentType.replace(/_/g, " ").toUpperCase() + ' agent requires column information.</p>';
        return;
    }


    try {
        chatHistory.innerHTML = `<p>Generating and executing ${selectedAgentType.toUpperCase()} query...</p>`;
        const response = await fetch('/query', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ 
                naturalLanguageQuery: naturalLanguageQuery,
                metadata: currentMetadataForQuery,
                agent_type: selectedAgentType // Send selected agent type
            })
        });

        const result = await response.json();
        let outputHTML = '';

        if (result.natural_language_response) {
            outputHTML += `<strong>Natural Language Answer:</strong><p>${result.natural_language_response}</p><hr>`;
        }

        if (result.executed_query_text) { // Changed from sql_query to executed_query_text
            outputHTML += `<strong>Executed Query (${selectedAgentType.toUpperCase()}):</strong><pre>${result.executed_query_text}</pre>`;
        } else {
            outputHTML += `<strong>Executed Query (${selectedAgentType.toUpperCase()}):</strong><pre>(Not available)</pre>`;
        }

        if (result.error) {
            if (!result.natural_language_response || !result.natural_language_response.toLowerCase().includes(String(result.error).toLowerCase())) {
                 outputHTML += `<p style="color: red;">Error: ${result.error}</p>`;
            }
        }

        if (result.results) {
            if (result.results.length > 0) {
                outputHTML += '<strong>Query Results:</strong>';
                let tableHTML = '<table><thead><tr>';
                Object.keys(result.results[0]).forEach(key => {
                    tableHTML += `<th>${key}</th>`;
                });
                tableHTML += '</tr></thead><tbody>';
                result.results.forEach(row => {
                    tableHTML += '<tr>';
                    Object.values(row).forEach(val => {
                        tableHTML += `<td>${val !== null ? val : ''}</td>`; // Handle nulls
                    });
                    tableHTML += '</tr>';
                });
                tableHTML += '</tbody></table>';
                outputHTML += tableHTML;
            } else if (!result.error) { 
                 outputHTML += '<p>Query executed successfully, but returned no results.</p>';
            }
        } else if (!result.error && (!result.natural_language_response || !result.natural_language_response.includes("no results"))) { 
            // Avoid double "no results" if NL summary already said it.
            outputHTML += '<p>No results returned from query execution.</p>';
        }
        
        chatHistory.innerHTML = outputHTML;

    } catch (error) {
        chatHistory.innerHTML = `<p style="color: red;">An unexpected error occurred: ${error.toString()}</p>`;
    }
});

document.getElementById('approveMetadata').addEventListener('click', () => {
    // Logic for approving metadata
    // For now, we'll just update currentMetadataForQuery with the edited text
    const metadataDisplay = document.getElementById('metadataDisplay');
    const newMetadataString = metadataDisplay.value;
    // This is a simplified parsing. A more robust solution would be needed for complex edits.
    try {
        const lines = newMetadataString.split('\n');
        const newTableName = lines.find(line => line.startsWith("Table Name:"))?.split(":")[1]?.trim();
        const newColumns = [];
        let colsStarted = false;
        for (const line of lines) {
            if (line.toLowerCase().includes("columns:")) {
                colsStarted = true;
                continue;
            }
            if (colsStarted && line.startsWith("- ")) {
                const parts = line.substring(2).split("(");
                const name = parts[0].trim();
                const type = parts[1]?.replace(")", "").trim();
                if (name && type) {
                    newColumns.push({ name, type });
                }
            }
        }

        if (newTableName) {
            currentMetadataForQuery.table_name = newTableName;
        }
        if (newColumns.length > 0) { // Only update if new columns were successfully parsed
            currentMetadataForQuery.columns = newColumns;
        }
        // Optionally, provide user feedback
        document.getElementById('uploadMessages').innerHTML = '<p style="color: blue;">Metadata updated locally. Ready for query.</p>';
        console.log("Updated metadata:", currentMetadataForQuery);

    } catch(e) {
        document.getElementById('uploadMessages').innerHTML = '<p style="color: red;">Error parsing edited metadata. Please check format.</p>';
        console.error("Error parsing metadata:", e);
    }
});

document.getElementById('requestPlot').addEventListener('click', async () => {
    const plotDisplay = document.getElementById('plotDisplay');
    plotDisplay.innerHTML = '<p>Generating plot...</p>'; // Show loading message

    try {
        const response = await fetch('/plot_data', {
            method: 'POST',
            // No body is needed if backend uses a globally cached DataFrame
        });

        const result = await response.json();

        if (response.ok && result.plot_image) {
            plotDisplay.innerHTML = `<img src="${result.plot_image}" alt="Generated Plot" style="max-width: 100%; height: auto;" />`;
        } else if (result.error) {
            plotDisplay.innerHTML = `<p style="color: red;">Error generating plot: ${result.error}</p>`;
        } else {
            plotDisplay.innerHTML = `<p style="color: red;">An unknown error occurred while generating the plot.</p>`;
        }
    } catch (error) {
        plotDisplay.innerHTML = `<p style="color: red;">An unexpected error occurred: ${error.toString()}</p>`;
    }
});
</script>
{% endblock %}
